<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CW Test</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    #log { background: #f3f3f3; padding: 10px; white-space: pre; font-size: 12px; max-height: 400px; overflow-y: auto; }
    #expr { width: 100%; padding: 8px; font-family: monospace; margin-top: 10px; }
    #preview { background: #f3f3f3; padding: 10px; white-space: pre; font-size: 11px; max-height: 300px; overflow-y: auto; }
    .pass { color: green; }
    .fail { color: red; }
  </style>
</head>
<body>

<h3>CW Integration Tests</h3>
<div id="log">Waiting for bootstrap...</div>

<h3>REPL (press Enter)</h3>
<input id="expr" placeholder="e.g. CW.Schema" />
<pre id="preview"></pre>

<script src="https://cdn.jsdelivr.net/npm/pocketbase@latest/dist/pocketbase.umd.js"></script>
<script type="module" src="index.js"></script>

<script type="module">
  const log = document.getElementById("log");

  function write(msg, cls) {
    const line = document.createElement("div");
    line.className = cls || "";
    line.textContent = msg;
    log.appendChild(line);
  }

  async function waitForBoot() {
    return new Promise(resolve => {
      const check = setInterval(() => {
        if (globalThis.CW?._booted) { clearInterval(check); resolve(); }
      }, 100);
    });
  }

  async function runTests() {
    await waitForBoot();
    log.textContent = "";
    write("=== TESTS START ===");

    // TEST 1: select
    write("\n--- TEST 1: select Schema ---");
    try {
      const run1 = CW.run({ operation: "select", target_doctype: "Schema" });
      await CW.controller(run1);
      if (run1.success && run1.target?.data?.length > 0) {
        write(`✅ select: ${run1.target.data.length} records`, "pass");
      } else {
        write(`❌ select failed: ${JSON.stringify(run1.error)}`, "fail");
      }
    } catch(e) { write(`❌ select threw: ${e.message}`, "fail"); }

    // TEST 2: create
    write("\n--- TEST 2: create Role ---");
    let createdName;
    try {
      const run2 = CW.run({ operation: "create", target_doctype: "Role" });
      run2.input.role_name = "Test Role " + Date.now();
      await CW.controller(run2);
      if (run2.success) {
        createdName = run2.target?.data?.[0]?.name;
        write(`✅ create: ${createdName}`, "pass");
      } else {
        write(`❌ create failed: ${JSON.stringify(run2.error)}`, "fail");
      }
    } catch(e) { write(`❌ create threw: ${e.message}`, "fail"); }

    // TEST 3: update
    write("\n--- TEST 3: update Role ---");
    if (createdName) {
      try {
        const run3 = CW.run({ operation: "update", target_doctype: "Role", query: { where: { name: createdName } } });
        run3.input.role_name = "Updated Role";
        await CW.controller(run3);
        if (run3.success) {
          write(`✅ update: ${run3.target?.data?.[0]?.role_name}`, "pass");
        } else {
          write(`❌ update failed: ${JSON.stringify(run3.error)}`, "fail");
        }
      } catch(e) { write(`❌ update threw: ${e.message}`, "fail"); }
    } else {
      write("⚠️ skipped — no created record", "fail");
    }

    // TEST 4: delete
    write("\n--- TEST 4: delete Role ---");
    if (createdName) {
      try {
        const run4 = CW.run({ operation: "delete", target_doctype: "Role", query: { where: { name: createdName } } });
        await CW.controller(run4);
        if (run4.success) {
          write(`✅ delete: docstatus=${run4.target?.data?.[0]?.docstatus}`, "pass");
        } else {
          write(`❌ delete failed: ${JSON.stringify(run4.error)}`, "fail");
        }
      } catch(e) { write(`❌ delete threw: ${e.message}`, "fail"); }
    } else {
      write("⚠️ skipped — no created record", "fail");
    }

    write("\n=== TESTS END ===");
  }

  window.addEventListener("load", runTests);

  // REPL
  document.getElementById("expr").addEventListener("keydown", async (e) => {
    if (e.key !== "Enter") return;
    try {
      const result = await eval(e.target.value);
      document.getElementById("preview").textContent =
        JSON.stringify(result, null, 2);
    } catch(err) {
      document.getElementById("preview").textContent = "Error: " + err.message;
    }
  });
</script>

</body>
</html>
