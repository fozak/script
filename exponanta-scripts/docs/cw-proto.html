<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CW _logChanges outlet prototype</title>
<style>
  body { font-family: monospace; font-size: 13px; padding: 1rem; background:#1e1e1e; color:#ddd; }
  pre { background:#111; padding:1rem; overflow:auto; border:1px solid #333; }
  button { margin: 4px; padding: 6px 12px; }
  h3 { color:#9cf; }
</style>
</head>
<body>
<h2>CW _logChanges / _runMerge prototype</h2>
<button onclick="step1()">1. Normal record edit (target._changes)</button>
<button onclick="step2()">2. fn_update into source.xlsx._changes</button>
<button onclick="step3()">3. fn_error into source.xlsx._changes</button>
<button onclick="step4()">4. _resolveStageHistory(xlsx)</button>
<button onclick="step5()">5. _runMerge (PULL gate)</button>
<button onclick="reset()">Reset run_doc</button>
<pre id="out"></pre>

<script>
// ---------- minimal CW mock ----------
const CW = {};

// fake schema registry: declares which fields PULL is allowed to promote
CW.Schema = {
  Task: { fields: [{fieldname:'subject'},{fieldname:'expected_time'},{fieldname:'is_group'}] },
  xlsx: { fields: [{fieldname:'ai_content'},{fieldname:'sheet_names'}] } // PULL-able fields from xlsx stage
};

CW._getAdapters = (run_doc) => ['fs','xlsx']; // mock chain

// ---------- outlet-aware logChanges ----------
CW._logChanges = function (run_doc, opts = {}) {
  const {
    outlet = run_doc.target,
    before = (outlet?.data?.[0]) || outlet?.data || {},
    after  = run_doc.input,
    op     = run_doc.operation,
    extraFields = []
  } = opts;

  const ch = [];
  const fields = new Set([...Object.keys(after), ...extraFields]);
  for (const f of fields) {
    const a = after[f], b = before[f];
    if (JSON.stringify(a) !== JSON.stringify(b)) {
      ch.push({ field: f, from: b ?? null, to: a });
    }
  }
  if (!ch.length) return null;

  const entry = { at: Date.now(), by: run_doc._by || null, ch, op };

  if (!outlet.data) outlet.data = {};
  if (!outlet.data._changes) outlet.data._changes = [];
  outlet.data._changes.push(entry);
  return entry;
};

// ---------- _resolveStageHistory ----------
CW._resolveStageHistory = function (run_doc, stage) {
  const bag = run_doc.source[stage];
  const changes = bag?.data?._changes || [];

  const findLast = (pred) => {
    for (let i = changes.length - 1; i >= 0; i--) if (pred(changes[i])) return changes[i];
    return null;
  };

  const get = (entry, field) => entry?.ch?.find(c => c.field === field)?.to;

  const lastUpdate = findLast(c => c.op === 'fn_update');
  const lastErrorAfterUpdate = findLast(c =>
    c.op === 'fn_error' && (!lastUpdate || c.at > lastUpdate.at)
  );

  bag.history = {
    v: lastUpdate ? get(lastUpdate, 'v') : 0,
    src: lastUpdate ? get(lastUpdate, 'src') : null,
    last_error: lastErrorAfterUpdate ? get(lastErrorAfterUpdate, 'err') : null,
    candidate_v: lastErrorAfterUpdate ? get(lastErrorAfterUpdate, 'v') : null,
    fixtures: ['f1','f2','f3']
  };
  return bag.history;
};

// ---------- _runMerge (simplified PULL gate) ----------
CW._mergeInput = (run_doc) => {
  run_doc.target.data[0] = run_doc.target.data[0] || {};
  Object.assign(run_doc.target.data[0], run_doc.input);
};
CW._clearInput = (run_doc) => { run_doc.input = { _state: {} }; };
CW._preflight = (run_doc) => {};
CW._stripVirtual = (run_doc) => {
  delete run_doc.target.data[0]._changes_candidate; // example virtual strip
};

CW._runMerge = async function (run_doc) {
  // PULL — promote declared fields from each source[stage].data -> input
  for (const [stageName, bag] of Object.entries(run_doc.source || {})) {
    const declared = CW.Schema?.[stageName]?.fields?.map(f => f.fieldname) || [];
    const produced = bag?.data || {};
    for (const f of declared) {
      if (f in produced) run_doc.input[f] = produced[f];
    }
  }

  // LOG (target-level diff, default outlet)
  CW._logChanges(run_doc);

  // MERGE
  CW._mergeInput(run_doc);

  // CLEAN
  CW._clearInput(run_doc);

  CW._preflight(run_doc);
  if (!run_doc.error) CW._stripVirtual(run_doc);
};

// ---------- run_doc fixture ----------
let run_doc;
function freshRunDoc() {
  return {
    operation: 'update',
    target_doctype: 'Task',
    target: { data: [{ subject: 'Old subject', expected_time: '0', _changes: [] }], meta: {} },
    input: { _state: {}, subject: 'New subject', expected_time: '5' },
    source: {
      fs:   { data: {}, meta: {} },
      xlsx: { data: {}, meta: {} }
    },
    error: null,
    status: 'pending'
  };
}
function reset() {
  run_doc = freshRunDoc();
  log('--- run_doc reset ---');
  show();
}
reset();

// ---------- log/output ----------
function log(msg) {
  document.getElementById('out').textContent += msg + '\n';
}
function show() {
  document.getElementById('out').textContent += JSON.stringify(run_doc, (k,v)=> typeof v==='function' ? '[fn]' : v, 2) + '\n\n';
}

// ---------- demo steps ----------
function step1() {
  log('### Step 1: normal record diff -> target.data[0]._changes (default outlet)');
  const entry = CW._logChanges(run_doc);
  log('logged entry: ' + JSON.stringify(entry));
  show();
}

function step2() {
  log('### Step 2: fn_update -> source.xlsx.data._changes (custom outlet)');
  const prevSrc = 'async function update(run_doc){ /* v2 */ }';
  const newSrc  = 'async function update(run_doc){ /* v3, filters empty sheet names */ }';

  const entry = CW._logChanges(run_doc, {
    outlet: run_doc.source.xlsx,
    before: { v: 2, src: prevSrc, err: null },
    after:  { v: 3, src: newSrc,  err: null },
    op: 'fn_update',
    extraFields: ['v','src','err']
  });
  log('logged entry: ' + JSON.stringify(entry, null, 2));
  show();
}

function step3() {
  log('### Step 3: fn_error -> source.xlsx.data._changes (candidate v4 failed)');
  const entry = CW._logChanges(run_doc, {
    outlet: run_doc.source.xlsx,
    before: { v: 3, err: null },
    after:  { v: 4, err: { code:'TYPE_ERROR', msg:'sheets is undefined', fixture:'f3' } },
    op: 'fn_error',
    extraFields: ['v','err']
  });
  log('logged entry: ' + JSON.stringify(entry, null, 2));
  show();
}

function step4() {
  log('### Step 4: _resolveStageHistory("xlsx") -> hydrate source.xlsx.history');
  const h = CW._resolveStageHistory(run_doc, 'xlsx');
  log('history: ' + JSON.stringify(h, null, 2));
  show();
}

function step5() {
  log('### Step 5: _runMerge -> PULL declared xlsx fields into input, then merge into target');
  // simulate xlsx adapter having produced ai_content/sheet_names in source.xlsx.data
  run_doc.source.xlsx.data.ai_content = 'extracted text...';
  run_doc.source.xlsx.data.sheet_names = ['Sheet1','Sheet2'];
  run_doc.source.xlsx.data.not_declared_field = 'should NOT be pulled';

  CW._runMerge(run_doc).then(() => {
    log('after _runMerge:');
    show();
    log('Note: ai_content/sheet_names pulled into target (declared in CW.Schema.xlsx.fields).');
    log('not_declared_field NOT pulled (not in schema).');
    log('source.xlsx.data._changes (fn history) untouched by target merge.');
  });
}
</script>
</body>
</html>
