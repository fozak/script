<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channels</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/css/tabler.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
 <link rel="stylesheet" href="editor.css">
  <script src="https://cdn.jsdelivr.net/npm/pocketbase@latest/dist/pocketbase.umd.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tabler/1.0.0-beta17/js/tabler.min.js"></script>

  <style>
    /* full-height chat layout */
    html, body { height: 100%; }
    .navbar-expand-md { position: sticky; top: 0; z-index: 100; }
    /* scrollable panels */
    .scrollable { overflow-y: auto; }

    /* nav-link active state override for chat list */
    .nav-pills .nav-link.active { background: var(--tblr-primary-lt); color: var(--tblr-primary); }
    .nav-pills .nav-link:not(.active):hover { background: var(--tblr-bg-surface-secondary); }
    .nav-pills .nav-link { color: var(--tblr-body-color); }

    /* hr-text divider */
    .hr-text { display: flex; align-items: center; gap: .5rem; margin: 1.5rem 0; }
    .hr-text::before, .hr-text::after { content: ''; flex: 1; border-top: 1px solid var(--tblr-border-color); }
  </style>
</head>
<body class="antialiased">

<!-- navbar — same as app.html -->
<header class="navbar navbar-expand-md navbar-dark" style="background:#1e3a5f;">
  <div class="container-xl">
    <a class="navbar-brand" href="app.html">
      <span class="navbar-brand-text">← App</span>
    </a>
    <span class="navbar-brand">Channels</span>
    <div class="ms-auto d-flex align-items-center gap-2">
      <span id="topbar-user" class="text-white-50" style="font-size:.8rem;"></span>
    </div>
  </div>
</header>

<!-- full height chat container -->
<div class="container-xl h-100 p-0 p-md-3">
  <div class="card h-100" style="overflow:hidden;">
    <div id="threads-app" class="h-100 d-flex" style="overflow:hidden;">
      <div id="threads_left"  class="h-100 flex-shrink-0" style="width:300px; border-right:1px solid var(--tblr-border-color); overflow:hidden;"></div>
      <div id="threads_right" class="h-100 flex-fill"     style="overflow:hidden;"></div>
    </div>
  </div>
</div>

<!-- same bootstrap as app.html -->
<script type="module" src="index.js"></script>

<script type="module">
  await new Promise(resolve => {
    const t = setInterval(() => {
      if (globalThis.CW?._config && globalThis.Adapter?.pocketbase) {
        clearInterval(t); resolve();
      }
    }, 50);
  });

  if (typeof authRestore === 'function') authRestore();

  const el = document.getElementById('topbar-user');
  const u  = globalThis.pb?.authStore?.model;
  if (el && u) el.textContent = u.email || '';

  await import('./threads.js');

  // boot — mount ChannelList into left panel
  await CW.run({
    operation:      'select',
    target_doctype: 'Channel',
    view:           'list',
    component:      'ChannelList',
    container:      'threads_left',
    options:        { render: true },
  });

  // right panel — placeholder until user selects a post
  CW._render({
    component: 'PostPlaceholder',
    container: 'threads_right',
    target:    { data: [] },
    options:   { render: true },
  });
</script>

</body>
</html>
