<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>CW</title>
<link rel="preconnect" href="https://rsms.me">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">

  <style>
    #main_container:empty,
    #left_pane:empty,
    #right_pane:empty { display: none; }
    .threads-left  { height: 100vh; overflow-y: auto; border-right: 1px solid var(--tblr-border-color); }

/* column narrower---*/
.cw-universal-grid table {
  table-layout: fixed;
  width: 100%;
}

.cw-universal-grid td,
.cw-universal-grid th {
  word-wrap: break-word;
  white-space: normal;
}

  <div id="nav_container">
   
  </div>

      <div class="col-md-9 threads-right" id="right_pane"></div>
    </div>
  </div>
  <div id="toast_container"></div>
