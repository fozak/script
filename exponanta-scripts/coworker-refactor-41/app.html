<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CW App</title>
  <!-- Tabler CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/css/tabler.min.css">
</head>
<body class="antialiased">
<div class="wrapper">

  <!-- Nav -->
  <div class="navbar navbar-expand-md navbar-light d-print-none border-bottom">
    <div class="container-xl">
      <button id="back_btn" class="btn btn-sm btn-outline-secondary me-1" onclick="navigate('back')">←</button>
      <button id="forward_btn" class="btn btn-sm btn-outline-secondary me-2" onclick="navigate('forward')">→</button>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0" id="breadcrumbs">
          <li class="breadcrumb-item active">Home</li>
        </ol>
      </nav>
      <!-- Auth state — Alpine handles this section -->
      <div class="ms-auto d-flex align-items-center gap-2" x-data x-show="$store.auth.isValid">
        <span class="avatar avatar-sm"
          :style="`background-color:${$store.auth.avatarColor}`"
          x-text="$store.auth.initials">
        </span>
        <span x-text="$store.auth.name" class="d-none d-md-inline"></span>
        <a href="#" class="btn btn-sm btn-outline-secondary" @click.prevent="authLogout(); location.reload()">Logout</a>
      </div>
      <div class="ms-auto" x-data x-show="!$store.auth.isValid">
        <a href="/login.html" class="btn btn-sm btn-primary">Login</a>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="page-wrapper">
    <div class="container-xl py-4">
      <div id="main_container"></div>
    </div>
  </div>

  <!-- REPL -->
  <div class="container-xl pb-4">
    <input id="expr" class="form-control font-monospace" placeholder="JS expression (Enter to run)">
    <pre id="preview" class="mt-2 p-3 bg-light border rounded" style="font-size:11px;max-height:200px;overflow-y:auto"></pre>
  </div>

</div>

<!-- 1. PocketBase SDK — must be first (pb global used by adapter + auth) -->
<script src="https://cdn.jsdelivr.net/npm/pocketbase@latest/dist/pocketbase.umd.js"></script>

<!-- 2. React UMD — must be before TanStack -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<!-- TanStack Table UMD — after React -->
<!--<script src="https://unpkg.com/@tanstack/react-table@8.20.5/build/umd/index.production.js"></script>
<script>globalThis.TanStackTable = globalThis.ReactTable; console.log('✅ TanStack Table loaded:', !!globalThis.TanStackTable);</script>
-->
<!-- 3. Alpine — before Alpine.start() -->
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

<!-- 4. Tabler JS — UI components -->
<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/js/tabler.min.js"></script>

<!-- 5. CW modules — order matters -->
<script type="module" src="index.js"></script>   <!-- CW-state, CW-config, CW-utils, CW-run, pb-adapter, auth -->
<script type="module" src="CW-ui.js"></script>   <!-- React components, CW._render, CW._components -->

<!-- 6. App bootstrap — after CW booted -->
<script type="module">
  async function waitForBoot() {
    return new Promise(resolve => {
      const check = setInterval(() => {
        if (globalThis.CW?._booted) { clearInterval(check); resolve(); }
      }, 100);
    });
  }

  window.addEventListener('load', async () => {
    await waitForBoot();

    // Restore auth session
    if (typeof authRestore === 'function') authRestore();

    // Initial render
    const run = CW.run({
      operation:      'select',
      target_doctype: 'Role',
      query:          { take: 10 },
      view:           'list',
      component:      'MainGrid',
      container:      'main_container',
      options:        { render: true },
    });
    await CW.controller(run);
  });

  // REPL
  document.getElementById('expr').addEventListener('keydown', async (e) => {
    if (e.key !== 'Enter') return;
    try {
      const result = await eval(e.target.value);
      document.getElementById('preview').textContent = JSON.stringify(result, null, 2);
    } catch(err) {
      document.getElementById('preview').textContent = 'Error: ' + err.message;
    }
  });
</script>

<!-- 7. Alpine store init — inline defaults, authStoreDefaults may not be loaded yet -->
<script>
  document.addEventListener('alpine:init', () => {
    Alpine.store('auth', {
      isValid:    false,
      verified:   false,
      id:         null,
      name:       '',
      email:      '',
      avatar:     null,
      initials:   '',
      avatarColor: '#3b5bdb'
    });
  });
</script>

</body>
</html>
