<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Annotator</title>
<style>
  body { font-family: system-ui, sans-serif; line-height: 1.6; padding: 2rem; max-width: 800px; margin: 0 auto; }
  #status { position: fixed; top: 10px; right: 10px; padding: 6px 12px; background: #333; color: #fff;
            border-radius: 4px; font: 13px system-ui; z-index: 2147483647; }
  #log { position: fixed; bottom: 0; left: 0; right: 0; max-height: 160px; overflow-y: auto;
         background: rgba(0,0,0,.85); color: #0f0; font: 12px monospace; padding: 6px 10px; z-index: 2147483647; }
  mark[data-ann] { background: rgba(255,220,0,0.5); border-radius: 2px; cursor: pointer; }
</style>
</head>
<body>
<div id="status">Mode: OFF</div>
<div id="log"></div>

<h1>Sample content</h1>
<p>Replace this with your real page content. Select text while annotation mode is ON (Alt+A) to create an annotation.</p>

<script>
// ── Logger ───────────────────────────────────────────────────────────────────
const log = (msg, color) => {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.style.color = color || '#0f0';
  line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
};
const origWarn = console.warn;
console.warn = (...args) => { log('⚠ ' + args.join(' '), '#ff0'); origWarn(...args); };
log('Page loaded. Press Alt+A to start.');
</script>
<script>
// ── Annotator IIFE ───────────────────────────────────────────────────────────
(function () {
  'use strict';

  // ── Configurable boundary-context window size ────────────────────────────
  const CONTEXT_CHARS = 32; // chars captured before selection start / after selection end

  const KEY    = 'cw_annotations:' + location.hostname + location.pathname;
  const TOGGLE = e => e.altKey && e.key === 'a';
  let data = JSON.parse(localStorage.getItem(KEY) || '[]');
  let mode = false;
  const cleanups = new Map();
  const save = () => localStorage.setItem(KEY, JSON.stringify(data));

  const removeAnn = (id) => {
    data = data.filter(a => a.id !== id);
    save();
    (cleanups.get(id) || []).forEach(fn => fn());
    cleanups.delete(id);
    document.querySelectorAll(`[data-ann="${id}"]`).forEach(el => el.remove());
    log('🗑 deleted annotation ' + id.slice(0, 8), '#f88');
  };

  function loadScript(src) {
    return new Promise((res, rej) => {
      if (document.querySelector(`script[src="${src}"]`)) { res(); return; }
      const s = document.createElement('script');
      s.src = src; s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  // ── Canonical text source: TreeWalker over text nodes only ───────────────
  // Never use element.innerText (layout-dependent, doesn't match raw node lengths).
  function shouldSkip(node) {
    const p = node.parentElement;
    if (!p) return true;
    const tag = p.tagName;
    if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'NOSCRIPT') return true;
    if (p.hidden) return true;
    const style = window.getComputedStyle(p);
    if (style.display === 'none' || style.visibility === 'hidden') return true;
    return false;
  }

  function getTextNodes(root) {
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode: n => shouldSkip(n) ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT
    });
    const nodes = [];
    let n;
    while (n = walker.nextNode()) nodes.push(n);
    return nodes;
  }

  function getAnchorText(root) {
    const nodes = getTextNodes(root);
    let text = '';
    const offsets = []; // offsets[i] = char offset in `text` where nodes[i] begins
    for (const node of nodes) {
      offsets.push(text.length);
      text += node.textContent;
    }
    return { text, nodes, offsets };
  }

  // Convert a flat character offset back into {node, offset} for Range construction.
  function posToNodeOffset(charPos, nodes, offsets) {
    for (let i = nodes.length - 1; i >= 0; i--) {
      if (offsets[i] <= charPos) {
        return { node: nodes[i], offset: charPos - offsets[i] };
      }
    }
    return null;
  }

  // ── Element selector waterfall (used for image/area annotations only) ────
  function bestSelector(el) {
    if (el.id) return '#' + CSS.escape(el.id);
    if (el.dataset && el.dataset.cwPath) return `[data-cw-path="${el.dataset.cwPath}"]`;
    const src  = el.getAttribute('src') || el.getAttribute('data-src') || '';
    const base = src.split('/').pop().split('?')[0];
    if (base && document.querySelectorAll(`[src*="${base}"]`).length === 1)
      return `[src*="${CSS.escape(base)}"]`;
    if (el.getAttribute('alt'))
      return `img[alt="${CSS.escape(el.getAttribute('alt'))}"]`;
    const cls = [...el.classList].filter(c =>
      !/active|open|hover|visible|show|hide|selected/.test(c));
    if (cls.length) {
      const sel = el.tagName.toLowerCase() + '.' + cls.join('.');
      if (document.querySelectorAll(sel).length === 1) return sel;
    }
    const parts = [];
    let node = el;
    for (let i = 0; i < 4 && node && node !== document.body; i++) {
      const idx = [...(node.parentNode?.children || [])].indexOf(node) + 1;
      parts.unshift(`${node.tagName.toLowerCase()}:nth-child(${idx})`);
      node = node.parentNode;
    }
    return parts.join(' > ');
  }

  function resolveEl(ann) {
    try { const el = document.querySelector(ann.selector); if (el) return el; } catch (_) {}
    if (ann.fallback)
      return [...document.querySelectorAll('img,video,canvas')]
        .find(el => (el.src || '').includes(ann.fallback)) || null;
    return null;
  }

  // ── Tippy edit ─────────────────────────────────────────────────────────
  function attachTippy(el, id) {
    return tippy(el, {
      content: '...',
      trigger: 'click',
      placement: 'top',
      animation: false,
      onShow(inst) {
        setTimeout(() => inst.hide(), 0);
        const ann = data.find(a => a.id === id);
        if (!ann) return;
        setTimeout(() => {
          const n = prompt('Edit note (blank = delete):', ann.note);
          if (n === null) return;
          if (n.trim() === '') { removeAnn(id); return; }
          ann.note = n.trim();
          save();
          el.title = n.trim();
          log('✏ updated: ' + n.trim());
        }, 10);
      }
    });
  }

  // ── TEXT — boundary-bracket anchoring ─────────────────────────────────────
  // We store ONLY `before` (CONTEXT_CHARS chars immediately preceding the
  // selection) and `after` (CONTEXT_CHARS chars immediately following it).
  // The annotated content itself is never stored — whatever currently sits
  // between the two resolved boundaries is what gets highlighted. This means
  // edits made *inside* the original selection do not break the annotation;
  // only edits that clip the `before`/`after` windows themselves can.

  function captureBoundaries(root, range) {
    const { text, nodes, offsets } = getAnchorText(root);

    // Find the flat-text offset corresponding to range.startContainer/offset
    // and range.endContainer/offset by locating those nodes in our node list.
    function flatOffsetFor(container, localOffset) {
      const idx = nodes.indexOf(container);
      if (idx === -1) return -1;
      return offsets[idx] + localOffset;
    }

    const startFlat = flatOffsetFor(range.startContainer, range.startOffset);
    const endFlat   = flatOffsetFor(range.endContainer, range.endOffset);
    if (startFlat === -1 || endFlat === -1) return null;

    const before = text.slice(Math.max(0, startFlat - CONTEXT_CHARS), startFlat);
    const after  = text.slice(endFlat, endFlat + CONTEXT_CHARS);

    return { before, after };
  }

  // Try to resolve {before, after} -> {start, end} flat offsets in current anchorText.
  // Returns null if not found (orphan).
  function resolveBoundaries(anchorText, before, after) {
    if (!before && !after) return null;

    // Find all candidate `before` end-positions (i.e. positions right after
    // each occurrence of `before` in the text).
    const beforeMatches = [];
    if (before) {
      let from = 0, idx;
      while ((idx = anchorText.indexOf(before, from)) !== -1) {
        beforeMatches.push(idx + before.length);
        from = idx + 1;
      }
    }

    // If `before` is empty (selection started at very beginning of root),
    // treat position 0 as the sole candidate.
    const startCandidates = before ? beforeMatches : [0];
    if (startCandidates.length === 0) return null;

    // For each start candidate, search for `after` starting at that point,
    // within a bounded search window so we don't grab a wildly distant match.
    const MAX_GAP = 4000; // guardrail: cap how far start/end can be apart
    let best = null;
    for (const start of startCandidates) {
      let endIdx;
      if (after) {
        endIdx = anchorText.indexOf(after, start);
        if (endIdx === -1 || endIdx - start > MAX_GAP) continue;
      } else {
        // No `after` captured (selection ended at very end of root).
        endIdx = anchorText.length;
      }
      const gap = endIdx - start;
      if (best === null || gap < best.gap) {
        best = { start, end: endIdx, gap };
      }
    }
    return best ? { start: best.start, end: best.end } : null;
  }

  // Progressive shrink: if the full `before`/`after` strings fail to match
  // (because an edit clipped the outer/far edge of the captured window),
  // retry with a shorter window, keeping the inner edge (closest to the
  // original selection) fixed and trimming from the outer edge.
  function resolveBoundariesWithShrink(anchorText, before, after) {
    const MIN_CHARS = 6; // below this, context is too weak to trust
    for (let len = (before || after || '').length || CONTEXT_CHARS; len >= MIN_CHARS; len -= 4) {
      // `before`: keep the END (closest to selection start) fixed, trim the START.
      const b = before ? before.slice(Math.max(0, before.length - len)) : '';
      // `after`: keep the START (closest to selection end) fixed, trim the END.
      const a = after ? after.slice(0, Math.min(after.length, len)) : '';
      const result = resolveBoundaries(anchorText, b, a);
      if (result) return { ...result, shrunkTo: len };
      if (!before && !after) break;
    }
    return null;
  }

  function buildRangeFromOffsets(root, start, end) {
    const { nodes, offsets } = getAnchorText(root);
    const startPos = posToNodeOffset(start, nodes, offsets);
    const endPos   = posToNodeOffset(end, nodes, offsets);
    if (!startPos || !endPos) return null;
    try {
      const r = document.createRange();
      r.setStart(startPos.node, startPos.offset);
      r.setEnd(endPos.node, endPos.offset);
      return r;
    } catch (e) {
      return null;
    }
  }

  // Handle ranges that span multiple text nodes/elements: wrap each
  // intersected text node in its own <mark> rather than relying on
  // range.surroundContents (which throws on partial-element selections).
  function highlightRange(range, id) {
    const marks = [];
    if (range.collapsed) return false;

    const root = range.commonAncestorContainer.nodeType === 3
      ? range.commonAncestorContainer.parentNode
      : range.commonAncestorContainer;
    const nodes = getTextNodes(root).filter(n => range.intersectsNode(n));

    if (nodes.length === 0) return false;

    try {
      nodes.forEach(node => {
        const nodeRange = document.createRange();
        nodeRange.selectNodeContents(node);
        if (node === range.startContainer) nodeRange.setStart(node, range.startOffset);
        if (node === range.endContainer)   nodeRange.setEnd(node, range.endOffset);
        if (nodeRange.collapsed) return;
        const mark = document.createElement('mark');
        mark.dataset.ann = id;
        mark.style.cssText = 'background:rgba(255,220,0,0.5);border-radius:2px;cursor:pointer;';
        nodeRange.surroundContents(mark);
        marks.push(mark);
      });
    } catch (e) {
      log('⚠ highlight failed: ' + e.message, '#ff0');
      marks.forEach(m => m.replaceWith(...m.childNodes));
      return false;
    }

    const ann = data.find(a => a.id === id);
    marks.forEach(m => { m.title = ann ? ann.note : ''; attachTippy(m, id); });

    cleanups.set(id, [() => marks.forEach(m => m.replaceWith(...m.childNodes))]);
    log('✅ text annotated (' + marks.length + ' node' + (marks.length > 1 ? 's' : '') + ')');
    return true;
  }

  function findAndHighlight(ann) {
    const { text } = getAnchorText(document.body);

    // Fast path: try exact before/after, full CONTEXT_CHARS window.
    let resolved = resolveBoundaries(text, ann.before, ann.after);
    let mode = 'exact';

    // Fallback: progressive shrink from the outer edge.
    if (!resolved) {
      resolved = resolveBoundariesWithShrink(text, ann.before, ann.after);
      mode = 'shrunk';
    }

    if (!resolved) {
      console.warn('[annotator] orphan text annotation:', ann.id, ann.note);
      return false;
    }

    const range = buildRangeFromOffsets(document.body, resolved.start, resolved.end);
    if (!range) {
      console.warn('[annotator] could not build range for:', ann.id);
      return false;
    }

    const ok = highlightRange(range, ann.id);
    if (ok && mode === 'shrunk') {
      log('〰 anchored with shrunk context (window=' + resolved.shrunkTo + '): ' + ann.note, '#fa0');
    }
    return ok;
  }

  // ── IMAGE / AREA (unchanged from original) ────────────────────────────────
  function placePin(el, ann) {
    const pin = document.createElement('div');
    pin.dataset.ann = ann.id;
    pin.title = ann.note;
    pin.style.cssText = `
      position:fixed;z-index:2147483647;pointer-events:auto;user-select:none;
      width:24px;height:24px;border-radius:50%;cursor:pointer;
      background:#e53935;color:#fff;font:bold 14px system-ui;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 2px 8px rgba(0,0,0,.5);
    `;
    pin.textContent = '📌';
    document.body.appendChild(pin);
    const posPin = () => {
      const r = el.getBoundingClientRect();
      if (!r.width && !r.height) return;
      pin.style.left = (r.left + r.width  * ann.offset.x - 12) + 'px';
      pin.style.top  = (r.top  + r.height * ann.offset.y - 12) + 'px';
    };
    posPin();
    const ro = new ResizeObserver(posPin);
    ro.observe(el);
    window.addEventListener('scroll', posPin, { passive: true });
    window.addEventListener('resize', posPin, { passive: true });
    attachTippy(pin, ann.id);
    log('📌 ' + ann.type + ' annotated: ' + ann.selector.slice(0, 40));
    cleanups.set(ann.id, [() => {
      ro.disconnect();
      window.removeEventListener('scroll', posPin);
      window.removeEventListener('resize', posPin);
      pin.remove();
    }]);
  }

  // ── Restore ───────────────────────────────────────────────────────────────
  // All annotations are resolved against the DOM first; mutation (wrapping)
  // happens only after resolution, so earlier annotations' wrapping doesn't
  // corrupt offset calculations for ones resolved later in the same pass.
  function restore() {
    if (!data.length) { log('No saved annotations for this page.'); return; }
    log('Restoring ' + data.length + ' annotation(s)...');

    const textAnns  = data.filter(a => a.type === 'text');
    const otherAnns = data.filter(a => a.type !== 'text');

    // Resolve all text annotations' ranges up front (single pass, same
    // unmodified DOM), THEN highlight them in order, so wrapping annotation
    // #1 doesn't shift offsets being used to resolve annotation #2.
    const resolvedRanges = [];
    for (const ann of textAnns) {
      const { text } = getAnchorText(document.body);
      let resolved = resolveBoundaries(text, ann.before, ann.after);
      let mode = 'exact';
      if (!resolved) {
        resolved = resolveBoundariesWithShrink(text, ann.before, ann.after);
        mode = 'shrunk';
      }
      if (resolved) resolvedRanges.push({ ann, resolved, mode });
      else console.warn('[annotator] orphan text:', ann.id, ann.note);
    }
    // Apply highlights in document order (start offset ascending) so
    // wrapping happens left-to-right and later offsets (already computed)
    // remain valid for nodes not yet touched.
    resolvedRanges.sort((a, b) => a.resolved.start - b.resolved.start);
    for (const { ann, resolved, mode } of resolvedRanges) {
      const range = buildRangeFromOffsets(document.body, resolved.start, resolved.end);
      if (!range) { console.warn('[annotator] could not build range for:', ann.id); continue; }
      const ok = highlightRange(range, ann.id);
      if (ok && mode === 'shrunk') {
        log('〰 anchored with shrunk context: ' + ann.note, '#fa0');
      }
    }

    otherAnns.forEach(ann => {
      const el = resolveEl(ann);
      if (el) placePin(el, ann);
      else console.warn('[annotator] orphan element:', ann.selector);
    });
  }

  // ── Create ────────────────────────────────────────────────────────────────
  document.addEventListener('mouseup', e => {
    if (!mode) return;

    // TEXT
    const sel = window.getSelection();
    if (sel && !sel.isCollapsed && sel.toString().trim().length >= 2) {
      const note = prompt('Annotate selection:');
      if (!note) { sel.removeAllRanges(); return; }

      const range = sel.getRangeAt(0).cloneRange();
      const boundaries = captureBoundaries(document.body, range);
      if (!boundaries) {
        log('⚠ could not capture boundary context for selection', '#ff0');
        sel.removeAllRanges();
        return;
      }

      const id = crypto.randomUUID();
      data.push({
        id, type: 'text', note,
        before: boundaries.before,
        after: boundaries.after,
        contextChars: CONTEXT_CHARS
      });
      save();
      highlightRange(range, id);
      sel.removeAllRanges();
      return;
    }

    // IMAGE / AREA — unchanged
    if (e.target.dataset.ann) return;
    const el = e.target.closest('[id],[data-cw-path],img,canvas,video,svg,section,article,main,header,footer,div,span') || e.target;
    const note = prompt('Annotate this element:');
    if (!note) return;
    const r = el.getBoundingClientRect();
    const src = el.getAttribute('src') || el.getAttribute('data-src') || '';
    const base = src.split('/').pop().split('?')[0];
    const ann = {
      id: crypto.randomUUID(),
      type: ['IMG', 'VIDEO', 'CANVAS'].includes(el.tagName) ? 'image' : 'area',
      note,
      selector: bestSelector(el),
      fallback: base || null,
      offset: {
        x: r.width ? (e.clientX - r.left) / r.width : 0.5,
        y: r.height ? (e.clientY - r.top) / r.height : 0.5
      }
    };
    data.push(ann); save();
    placePin(el, ann);
  }, true);

  // ── Toggle ────────────────────────────────────────────────────────────────
  window.addEventListener('keydown', e => {
    if (!TOGGLE(e)) return;
    mode = !mode;
    document.body.style.outline = mode ? '3px solid #e53935' : '';
    document.getElementById('status').textContent = 'Mode: ' + (mode ? 'ON — select text or click element' : 'OFF');
    document.getElementById('status').style.background = mode ? '#e53935' : '#333';
    log(mode ? '🟢 Annotation mode ON' : '⚫ Annotation mode OFF', mode ? '#0f0' : '#aaa');
  });

  // ── Public API ────────────────────────────────────────────────────────────
  window._ann = {
    list:   () => { console.table(data); log('Listed ' + data.length + ' annotations'); },
    clear:  () => { [...data].forEach(a => removeAnn(a.id)); log('Cleared all', '#f88'); },
    export: () => { const j = JSON.stringify(data, null, 2); log('Exported ' + data.length + ' annotations'); return j; },
  };

  // ── Boot ──────────────────────────────────────────────────────────────────
  log('Loading Tippy...');
  loadScript('https://unpkg.com/@popperjs/core@2/dist/umd/popper.min.js')
    .then(() => loadScript('https://unpkg.com/tippy.js@6/dist/tippy-bundle.umd.min.js'))
    .then(() => {
      log('✅ Tippy loaded. Restoring annotations...');
      restore();
      log('Ready. Alt+A to toggle mode.');
    })
    .catch(err => log('❌ Failed to load Tippy: ' + err, '#f00'));
})();
</script>
</body>
</html>
