<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channels</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler/1.0.0-beta17/css/tabler.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pocketbase@latest/dist/pocketbase.umd.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tabler/1.0.0-beta17/js/tabler.min.js"></script>

  <style>
    body { background:#f1f5f9; }
    .post-card { background:#fff; border-radius:8px; border:1px solid #e2e8f0; margin-bottom:12px; transition:box-shadow .15s; }
    .post-card:hover { box-shadow:0 2px 12px rgba(0,0,0,.08); }
    .post-card.is-draft { background:repeating-linear-gradient(45deg,#fff9e6,#fff9e6 10px,#fffdf5 10px,#fffdf5 20px); }
    .post-body { line-height:1.75; color:#334155; }
    .post-body h1,.post-body h2,.post-body h3 { color:#1e293b; margin-top:1.25rem; }
    .post-body code { background:#f1f5f9; padding:2px 6px; border-radius:4px; font-size:.85em; }
    .post-body pre { background:#1e293b; color:#e2e8f0; padding:1rem; border-radius:6px; overflow-x:auto; }
    .post-body pre code { background:none; color:inherit; padding:0; }
    .post-body blockquote { border-left:3px solid #206bc4; padding-left:1rem; color:#64748b; margin:1rem 0; }
    .post-body a { color:#206bc4; }
    .comment-item { background:#f8fafc; border-left:3px solid #e2e8f0; border-radius:0 6px 6px 0; padding:10px 14px; margin-bottom:8px; }
    .comment-item.is-flagged { border-left-color:#f59e0b; background:#fffbeb; }
    .comment-item.is-hidden  { border-left-color:#ef4444; background:#fef2f2; opacity:.75; }
    .md-toolbar { display:flex; gap:4px; padding:6px 8px; background:#f8fafc; border:1px solid #e2e8f0; border-bottom:none; border-radius:6px 6px 0 0; }
    .md-toolbar button { padding:2px 10px; border:1px solid #e2e8f0; background:#fff; border-radius:4px; cursor:pointer; font-size:.8rem; font-weight:600; }
    .md-toolbar button:hover { background:#e2e8f0; }
    .md-textarea { border-radius:0 0 6px 6px !important; border-top:none !important; font-family:monospace; font-size:.875rem; }
    .channel-header { background:linear-gradient(135deg,#1e3a5f 0%,#206bc4 100%); color:#fff; border-radius:8px; padding:24px; margin-bottom:20px; }
    .channel-header h2 { color:#fff; margin:0 0 4px; }
    .channel-header p  { color:rgba(255,255,255,.75); margin:0; font-size:.9rem; }
    .breadcrumb-nav { font-size:.85rem; color:#64748b; margin-bottom:1rem; }
    .breadcrumb-nav a { color:#206bc4; text-decoration:none; cursor:pointer; }
    .breadcrumb-nav a:hover { text-decoration:underline; }
    .breadcrumb-nav span { margin:0 6px; color:#94a3b8; }
    .tag-pill { display:inline-block; padding:2px 8px; background:#eff6ff; color:#1d4ed8; border-radius:20px; font-size:.72rem; font-weight:500; margin-right:4px; }
    .status-pill { font-size:.7rem; padding:2px 8px; border-radius:20px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
    .status-draft     { background:#fef9c3; color:#854d0e; }
    .status-published { background:#dcfce7; color:#166534; }
    .status-archived  { background:#f1f5f9; color:#64748b; }
    .avatar-circle { width:32px; height:32px; border-radius:50%; background:#206bc4; color:#fff; display:flex; align-items:center; justify-content:center; font-size:.75rem; font-weight:700; flex-shrink:0; }
    .empty-state { text-align:center; padding:48px 24px; color:#94a3b8; }
  </style>
</head>
<body>

<header class="navbar navbar-dark sticky-top" style="background:#1e3a5f;padding:0 1rem;">
  <div class="container-xl">
    <a class="navbar-brand" href="app.html">← App</a>
    <span class="navbar-brand">Channels</span>
    <div class="ms-auto">
      <span id="topbar-user" class="text-white-50" style="font-size:.8rem;"></span>
    </div>
  </div>
</header>

<div class="container-xl py-4" id="threads-app">
  <div class="text-center py-5">
    <div class="spinner-border text-primary"></div>
  </div>
</div>

<!-- same bootstrap as app.html -->
<script type="module" src="index.js"></script>

<!-- threads UI — after CW booted -->
<script type="module">
  await new Promise(resolve => {
    const t = setInterval(() => {
      if (globalThis.CW?._config && globalThis.Adapter?.pocketbase) {
        clearInterval(t); resolve();
      }
    }, 50);
  });

  if (typeof authRestore === 'function') authRestore();

  const el = document.getElementById('topbar-user');
  const u  = globalThis.pb?.authStore?.model;
  if (el && u) el.textContent = u.email || '';

  await import('./threads.js');
</script>

</body>
</html>
