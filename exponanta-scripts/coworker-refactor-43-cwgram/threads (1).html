<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channels</title>

  <!-- Tabler CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler/1.0.0-beta17/css/tabler.min.css">

  <!-- BlockNote editor styles (prebuilt) -->
  <link rel="stylesheet" href="editor.css">

  <style>
    html, body { height: 100%; margin: 0; }
    #threads-app { height: calc(100vh - 56px); overflow: hidden; }

    /* Two-column chat layout */
    .threads-layout { display: flex; height: 100%; }
    .threads-left  { width: 300px; min-width: 260px; border-right: 1px solid var(--tblr-border-color); display: flex; flex-direction: column; overflow: hidden; }
    .threads-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    @media (max-width: 768px) {
      .threads-left  { width: 100%; display: none; }
      .threads-left.active  { display: flex; }
      .threads-right { width: 100%; }
    }

    /* Channel / post list items */
    .channel-item, .post-item {
      padding: .75rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid var(--tblr-border-color);
      transition: background .12s;
    }
    .channel-item:hover, .post-item:hover { background: var(--tblr-active-bg, #f1f5f9); }
    .channel-item.active, .post-item.active { background: #e8f0fe; }

    /* Post detail scroll area */
    .post-body-area { flex: 1; overflow-y: auto; padding: 1.5rem; }

    /* Comments */
    .comment-list { flex: 1; overflow-y: auto; padding: 1rem; }
    .comment-item { margin-bottom: .75rem; }
    .comment-bubble {
      display: inline-block;
      max-width: 80%;
      padding: .5rem .875rem;
      border-radius: 1rem;
      font-size: .875rem;
      line-height: 1.4;
    }
    .comment-bubble.mine  { background: #1e3a5f; color: #fff; border-bottom-right-radius: .25rem; }
    .comment-bubble.theirs { background: #f1f5f9; color: #1e293b; border-bottom-left-radius: .25rem; }
    .comment-bubble.hidden { opacity: .45; font-style: italic; }

    /* Comment input bar */
    .comment-bar {
      padding: .75rem 1rem;
      border-top: 1px solid var(--tblr-border-color);
      display: flex;
      gap: .5rem;
      align-items: flex-end;
    }

    /* BlockNote editor container */
    .bn-editor-container {
      border: 1px solid var(--tblr-border-color);
      border-radius: .5rem;
      min-height: 280px;
      overflow: hidden;
    }
    .bn-editor-container .bn-container { min-height: 280px; }

    /* Badge tweaks */
    .badge-draft     { background: #f1f5f9; color: #64748b; }
    .badge-published { background: #d1fae5; color: #065f46; }
    .badge-archived  { background: #fee2e2; color: #991b1b; }

    .empty-state { text-align: center; padding: 3rem 1.5rem; color: #94a3b8; }

    /* Avatar circle */
    .avatar-circle {
      width: 36px; height: 36px; border-radius: 50%;
      background: #1e3a5f; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700; flex-shrink: 0;
    }
  </style>
</head>
<body class="antialiased">

<!-- Topbar -->
<header class="navbar navbar-dark sticky-top" style="background:#1e3a5f; height:56px;">
  <div class="container-fluid px-3">
    <a class="navbar-brand fw-bold" href="app.html" style="font-size:.95rem;">← App</a>
    <span class="navbar-brand fw-bold ms-2" id="topbar-channel-name">Channels</span>
    <div class="ms-auto d-flex align-items-center gap-2">
      <span id="topbar-user" class="text-white-50" style="font-size:.8rem;"></span>
    </div>
  </div>
</header>

<!-- App root -->
<div id="threads-app"></div>

<!-- Dependencies -->
<script src="https://cdn.jsdelivr.net/npm/pocketbase@latest/dist/pocketbase.umd.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- CW core (boots PocketBase adapter + auth) -->
<script type="module" src="index.js"></script>

<!-- Wait for CW, load schemas, mount threads UI -->
<script type="module">
  // 1. Wait for CW + PocketBase adapter to be ready
  await new Promise(resolve => {
    const t = setInterval(() => {
      if (globalThis.CW?._config && globalThis.Adapter?.pocketbase) {
        clearInterval(t); resolve();
      }
    }, 50);
  });

  // 2. Load channel schemas into CW
  try {
    const res     = await fetch('./channels-schemas.json');
    const schemas = await res.json();
    for (const s of schemas) {
      CW.Schema = CW.Schema || {};
      CW.Schema[s.schema_name] = s;
    }
  } catch(e) {
    console.warn('[threads] Could not load channels-schemas.json', e);
  }

  // 3. Restore auth session
  if (typeof authRestore === 'function') authRestore();

  // 4. Show current user in topbar
  const user = globalThis.pb?.authStore?.model;
  const el   = document.getElementById('topbar-user');
  if (el && user) el.textContent = user.email || user.name || '';

  // 5. Mount threads UI
  await import('./threads.js');
</script>

</body>
</html>
